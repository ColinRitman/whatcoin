name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  release:
    types: [ published ]

env:
  CMAKE_BUILD_TYPE: Release
  BUILD_JOBS: 4

jobs:
  build-ubuntu:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          libboost-all-dev \
          libssl-dev \
          libzmq3-dev \
          libpgm-dev \
          libunbound-dev \
          libsodium-dev \
          libunwind8-dev \
          liblzma-dev \
          libreadline6-dev \
          libldns-dev \
          git \
          curl \
          wget
          
    - name: Set up compiler
      run: |
        if [ "${{ matrix.compiler }}" = "clang" ]; then
          sudo apt-get install -y clang
          export CC=clang
          export CXX=clang++
        fi
        
    - name: Create build directory
      run: mkdir -p build
      
    - name: Configure with CMake
      run: |
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_CXX_COMPILER=$CXX
          
    - name: Build
      run: |
        cd build
        make -j${{ env.BUILD_JOBS }}
        
    - name: Run tests
      run: |
        cd build
        make test
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: whatcoin-ubuntu-${{ matrix.compiler }}
        path: build/bin/
        retention-days: 7

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    strategy:
      matrix:
        compiler: [clang]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install dependencies
      run: |
        brew update
        brew install \
          cmake \
          pkg-config \
          boost \
          openssl \
          zeromq \
          libpgm \
          unbound \
          libsodium \
          libunwind \
          xz \
          readline \
          ldns
          
    - name: Set up compiler
      run: |
        export CC=clang
        export CXX=clang++
        
    - name: Create build directory
      run: mkdir -p build
      
    - name: Configure with CMake
      run: |
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_CXX_COMPILER=$CXX
          
    - name: Build
      run: |
        cd build
        make -j${{ env.BUILD_JOBS }}
        
    - name: Run tests
      run: |
        cd build
        make test
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: whatcoin-macos-${{ matrix.compiler }}
        path: build/bin/
        retention-days: 7

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install dependencies
      run: |
        # Install vcpkg and dependencies
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg install boost openssl zeromq libsodium
        .\vcpkg integrate install
        cd ..
        
    - name: Create build directory
      run: mkdir build
      
    - name: Configure with CMake
      run: |
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
          -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake
          
    - name: Build
      run: |
        cd build
        cmake --build . --config ${{ env.CMAKE_BUILD_TYPE }} --parallel ${{ env.BUILD_JOBS }}
        
    - name: Run tests
      run: |
        cd build
        ctest -C ${{ env.CMAKE_BUILD_TYPE }}
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: whatcoin-windows
        path: build/bin/
        retention-days: 7

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format
        
    - name: Check code formatting
      run: |
        find src/ -name "*.cpp" -o -name "*.h" | xargs clang-format --dry-run --Werror

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        
    - name: Build for CodeQL
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake pkg-config libboost-all-dev libssl-dev libzmq3-dev
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug
        make -j4
        
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-ubuntu, build-macos, build-windows, lint, security-scan]
    if: github.event_name == 'release' && github.event.action == 'published'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create release assets
      run: |
        mkdir -p release-assets
        find artifacts -name "whatcoind" -o -name "whatcoind.exe" | while read file; do
          platform=$(echo $file | sed 's/.*whatcoin-\(.*\)\/.*/\1/')
          cp "$file" "release-assets/whatcoind-$platform"
        done
        
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: release-assets/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 